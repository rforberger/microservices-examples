apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tkn-git-clone
  namespace: argocd
spec:
  destination:
    namespace: microservices
    server: https://kubernetes.default.svc
  project: default
  source:
    path: task/git-clone/0.9/
    repoURL: https://github.com/tektoncd/catalog.git
    targetRevision: HEAD